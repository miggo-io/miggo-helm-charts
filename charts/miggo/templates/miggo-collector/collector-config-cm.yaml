{{ if .Values.miggoCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config-cm
  namespace: {{ include "miggo.namespace" . }}
data:
  collector-init-script.sh: |
    {{ .Files.Get "files/collector-init-script.sh" | nindent 4 }}

  config-template.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:{{ .Values.healthcheck.port }}
      oauth2client:
        client_id: {{ .Values.config.clientId }}
        client_secret_file: {{ .Values.miggoCollector.accessKeyMountLocation }}
        token_url: {{ .Values.config.authUrl }}/oauth2/v1/token
        timeout: 1m
      k8s_leader_elector:
        auth_type: serviceAccount
        lease_name: {{ include "miggo.fullname" . }}-collector
        lease_namespace: {{ include "miggo.namespace" . }}
        lease_duration: 75s
        renew_deadline: 50s
        retry_period: 10s

      {{- with .Values.miggoCollector.extraExtensions }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

      prometheus:
        config:
          scrape_configs:
            - job_name: 'collector'
              scrape_interval: {{ .Values.config.metrics.interval }}
              static_configs:
                - targets: [ 'localhost:8888' ]
              metric_relabel_configs:
                - target_label: "miggo-name"
                  replacement: "{{ .Values.miggo.clusterName }}"
                - target_label: "node-name"
                  replacement: "${env:NODE_NAME}"
                - target_label: "deployment-type"
                  replacement: "{{ if .Values.miggoCollector.instancePerNode }}daemonset{{ else }}deployment{{ end }}"

      k8s_cluster:
        k8s_leader_elector: k8s_leader_elector
        collection_interval: {{ .Values.config.metrics.interval }}
        auth_type: serviceAccount          # or kubeConfig for local dev
        allocatable_types_to_report:
          - cpu
          - memory
        metrics:
          k8s.pod.status_reason:
            enabled: true
          k8s.container.status.reason:
            enabled: true
        namespaces:
          - {{ include "miggo.namespace" . }}

    processors:
      metrics_transform:
        transforms:
          - include: 'otelcol_(.*)'
            match_type: regexp
            action: update
            new_name: "miggocol_$1"
          - include: miggocol_process_uptime
            match_type: strict
            new_name: miggo_component_status
            action: combine
            operations:
              - action: add_label
                new_label: component
                new_value: Miggo Collector
              - action: add_label
                new_label: chart_version
                new_value: {{ .Chart.Version }}

      batch/metrics:
        timeout: 10s

      batch/logs:
        timeout: 10s

      batch/traces:
        timeout: 10s

      transform/k8s_metric:
        metric_statements:
        - context: metric
          statements:
            - set(metric.name, Concat(["miggocol", metric.name], "."))
        - context: datapoint
          statements:
            - merge_maps(datapoint.attributes, resource.attributes, "insert")
            - set(datapoint.attributes["miggo-name"], "{{ .Values.miggo.clusterName }}")
            - set(datapoint.attributes["pod.hostname"], datapoint.attributes["k8s.pod.name"])
            - delete_key(datapoint.attributes, "k8s.pod.name")
            - set(datapoint.attributes["node.name"], datapoint.attributes["k8s.node.name"])
            - delete_key(datapoint.attributes, "k8s.node.name")
            - delete_key(datapoint.attributes, "container.id")
            - delete_key(datapoint.attributes, "k8s.pod.uid")
            - delete_key(datapoint.attributes, "otel.scope.name")
            - delete_key(datapoint.attributes, "otel.scope.version")
            - delete_key(datapoint.attributes, "pod.hostname")
            - delete_key(datapoint.attributes, "container.image.name")
            - delete_key(datapoint.attributes, "container.image.tag")

      filter/self-logs:
        logs:
          include:
            match_type: strict
            resource_attributes:
              - key: origin
                value: "selflogs"
      
      transform/collector-self-logs:
        log_statements:
          - context: resource
            statements:
              - delete_key(attributes, "service.name")
              - set(attributes["service.name"], "client-collector")
          - context: log
            statements:
              - set(attributes["service.name"], "client-collector")
              - set(attributes["type"], "applog")
              - set(attributes["miggo-name"], "{{ .Values.miggo.clusterName }}")

      {{- with .Values.miggoCollector.extraProcessors }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    exporters:
      debug:
        verbosity: "{{ .Values.miggoCollector.config.logVerbosity }}"

      prometheus:
        endpoint: 0.0.0.0:8889

      otlp_http:
        traces_endpoint: {{ include "collectorUrl" . }}/v1/traces
        metrics_endpoint: {{ include "collectorUrl" . }}/v1/metrics
        logs_endpoint: {{ include "collectorUrl" . }}/v1/logs
        profiles_endpoint: {{ include "collectorUrl" . }}/v1development/profiles
        auth:
          authenticator: oauth2client

      {{- with .Values.miggoCollector.extraExporters }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    service:
      telemetry:
        resource:
          attributes:
            - name: origin
              value: "selflogs"
        logs:
          encoding: json
          level: "{{ .Values.miggoCollector.config.internalLogVerbosity }}"
          processors:
            - batch:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: localhost:4318
                    insecure: true
        metrics:
          level: detailed
          readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888
      extensions:
        - health_check
        - oauth2client
        - k8s_leader_elector
        {{- if .Values.pprof.port }}
        - k8s_observer
        {{- end }}
        {{- range .Values.miggoCollector.extraExtensionNames }}
        - {{ . }}
        {{- end }}
      pipelines:
        {{- if .Values.miggoRuntime.profiler.enabled }}
        profiles:
          receivers:
            - otlp
          exporters:
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}
        {{- end }}
        metrics/sensors:
          receivers:
            - otlp
          processors:
            - batch/metrics
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - debug
            - prometheus
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}
        metrics/collector:
          receivers:
            - prometheus
          processors:
            - batch/metrics
            - metrics_transform
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - debug
            - prometheus
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}

        metrics/k8s:
          receivers:
            - k8s_cluster
          processors:
            - batch/metrics
            - transform/k8s_metric
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - prometheus
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}

        traces:
          receivers:
            - otlp
          processors:
            - batch/traces
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - debug
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}
        logs:
          receivers:
            - otlp
          processors:
            - batch/logs
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - debug
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}
        logs/self:
          receivers:
            - otlp
          processors:
            - filter/self-logs
            - transform/collector-self-logs
            - batch/logs
            {{- range .Values.miggoCollector.extraProcessorNames }}
            - {{ . }}
            {{- end }}
          exporters:
            - otlp_http
            {{- range .Values.miggoCollector.extraExporterNames }}
            - {{ . }}
            {{- end }}

        {{- with .Values.miggoCollector.extraPipelines }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{ end }}
