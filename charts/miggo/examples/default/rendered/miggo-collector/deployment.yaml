---
# Source: miggo/templates/miggo-collector/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-collector
  namespace: default
  labels:
    helm.sh/chart: miggo-0.0.183
    app.kubernetes.io/name: miggo-collector
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "v26.428.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
spec:
  
  replicas: 1
  
  selector:
    matchLabels:
      app.kubernetes.io/name: miggo-collector
      app.kubernetes.io/instance: example
  template:
    metadata:
      annotations:
        checksum/config: 9d078c17988a86a3c7a7fc7892ed8e13ce8f3d8eed02b8e00488f3545bb89401
      labels:
        component: collector
        miggo.io/app: example-collector
        helm.sh/chart: miggo-0.0.183
        app.kubernetes.io/name: miggo-collector
        app.kubernetes.io/instance: example
        app.kubernetes.io/version: "v26.428.1"
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        
        - name: miggo-regcred
      securityContext:
        {}
      serviceAccountName: example-collector
      initContainers:
        - name: collector-init-container
          image: "registry.miggo.io/miggo/miggo-collector:v26.428.1"
          securityContext:
            {}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh"]
          args:
            - -c
            - |
              bash /etc/collector-cm/collector-init-script.sh
          envFrom:
          env:
            - name: CLIENT_ID
              value: P2UjsJwOFdIeUAtW0pGTJ5SeJAlq
            - name: ACCESS_KEY_MOUNT_LOCATION
              value: /etc/miggo-access-key
            - name: API_HEALTH_URL
              value: https://api.miggo.io/health/status
            - name: OAUTH2_TOKEN_URL
              value: https://auth.miggo.io/oauth2/v1/token
            - name: AUTH_BASE_URL
              value: https://auth.miggo.io
          volumeMounts:
            - name: collector-config-cm
              mountPath: /etc/collector-cm
            - name: collector-config
              mountPath: /etc/collector
          
            - name: access-key
              mountPath: /etc/miggo-access-key
              subPath: ACCESS_KEY
      containers:
        - name: miggo-collector
          securityContext:
            {}
          image: "registry.miggo.io/miggo/miggo-collector:v26.428.1"
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/collector/config.yaml
            - --feature-gates
            - service.profilesSupport
          envFrom:
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              value: "400MiB"
          resources:
            limits:
              cpu: 100m
              memory: 500Mi
            requests:
              cpu: 10m
              memory: 200Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 6666
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 6666
            periodSeconds: 10
          volumeMounts:
          - name: collector-config
            mountPath: /etc/collector
          
          - name: access-key
            mountPath: /etc/miggo-access-key
            subPath: ACCESS_KEY
      volumes:
      - name: collector-config
        emptyDir: {}
      - name: collector-config-cm
        configMap:
          name: collector-config-cm
      
      - name: access-key
        secret:
          secretName: access-key-secret
          items:
          - key: ACCESS_KEY
            path: ACCESS_KEY
      priorityClassName: system-node-critical
