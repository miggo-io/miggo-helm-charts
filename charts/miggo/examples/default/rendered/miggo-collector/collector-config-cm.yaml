---
# Source: miggo/templates/miggo-collector/collector-config-cm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config-cm
  namespace: default
data:
  collector-init-script.sh: |
    
    #!/bin/bash
    
    ####################################################################################################
    # Collector Initialization Script
    #
    # This script automates the initialization and configuration process for the miggo-collector pod,
    # designed to run as an entrypoint in a Kubernetes environment (typically deployed via Helm).
    #
    # High-Level Steps and Purpose:
    #
    # 1. **Environment Validation:** Ensures that all critical environment variables and preconditions
    #    are present and set correctly. These variables are typically injected via Kubernetes manifests
    #    or Helm charts at deploy time.
    #
    # 2. **Reading Access Key:** Securely reads the access key from a mounted file or secret, used for
    #    authenticating against the miggo authentication service.
    #
    # 3. **API Request & Session JWT Acquisition:** Authenticates using client credentials with miggo's
    #    authentication backend, retrieves a session JWT, and validates the API connection.
    #
    # 4. **JWT Decoding:** Decodes the JWT, extracting its payload to retrieve project and tenant
    #    identifiers tied to the deployment.
    #
    # 5. **Tenant Information Extraction:** Parses out tenant and project IDs from the JWT payload for
    #    later use in configuration and as environment variables.
    #
    # 6. **Dynamic Configuration Generation:** Fills a collector configuration template with the
    #    discovered and provided values (using envsubst), generating the final config file necessary
    #    for the miggo-collector to operate.
    #
    # 7. **Backend Connectivity Check:** Validates that the miggo backend APIs (and their health
    #    endpoints) are reachable with the generated credentials/config, retrying if needed and
    #    logging appropriately.
    #
    # The script is tolerant to errors: it logs and aborts on failure for every critical step
    # to ensure that the collector never starts with invalid configuration or in an unhealthy
    # state. On each pod start, performs bootstrapping and configuration generation.
    #
    # Typical invocation: automatically, as the shell entrypoint of the collector container.
    ####################################################################################################
    
    set -euo pipefail  # Exit on error, undefined vars, pipe failures
    
    # Configuration
    readonly SCRIPT_NAME="$(basename "$0")"
    readonly LOG_LEVEL="${LOG_LEVEL:-INFO}"
    readonly MAX_RETRIES="${MAX_RETRIES:-3}"
    readonly RETRY_DELAY="${RETRY_DELAY:-5}"
    readonly TIMEOUT="${TIMEOUT:-30}"
    
    # Logging functions
    log() {
        local level="$1"
        shift
        echo "[$(date +'%Y-%m-%d %H:%M:%S')] [$level] [$SCRIPT_NAME] $*" >&2
    }
    
    log_error() { log "ERROR" "$@"; }
    log_info() {
        [[ "${LOG_LEVEL}" == "INFO" || "${LOG_LEVEL}" == "DEBUG" ]] && log "INFO " "$@" || true
    }
    log_debug() {
        [[ "${LOG_LEVEL}" == "DEBUG" ]] && log "DEBUG" "$@" || true
    }
    
    # Error handling
    cleanup() {
        local exit_code=$?
        if [[ $exit_code -ne 0 ]]; then
            log_error "Script failed with exit code $exit_code"
        fi
        return $exit_code
    }
    
    trap cleanup EXIT
    
    # Validation functions
    validate_environment() {
        log_info "Validating environment variables and paths"
    
        local required_vars=(
            "CLIENT_ID"
            "ACCESS_KEY_MOUNT_LOCATION"
            "CONFIG_TEMPLATE_PATH"
            "CONFIG_OUTPUT_PATH"
            "AUTH_BASE_URL"
        )
    
        for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
                log_error "Required environment variable $var is not set"
                return 1
            fi
        done
    
        if [[ ! -f "${ACCESS_KEY_MOUNT_LOCATION}" ]]; then
            log_error "Access key file not found at: ${ACCESS_KEY_MOUNT_LOCATION}"
            return 1
        fi
    
        if [[ ! -f "${CONFIG_TEMPLATE_PATH}" ]]; then
            log_error "Config template not found at: ${CONFIG_TEMPLATE_PATH}"
            return 1
        fi
    
        log_info "Environment validation completed successfully"
        return 0
    }
    
    read_access_key() {
        log_info "Reading access key from: ${ACCESS_KEY_MOUNT_LOCATION}"
    
        local access_key
        if ! access_key="$(cat "${ACCESS_KEY_MOUNT_LOCATION}" 2>/dev/null)"; then
            log_error "Failed to read access key file"
            return 1
        fi
    
        if [[ -z "${access_key// }" ]]; then
            log_error "Access key is empty or contains only whitespace"
            return 1
        fi
    
        # Remove any trailing whitespace/newlines
        access_key="$(echo "$access_key" | tr -d '\n\r' | xargs)"
    
        log_info "Access key read successfully"
        echo "$access_key"
    }
    
    make_api_request() {
        local client_id="$1"
        local access_key="$2"
        local attempt=1
    
        log_info "Making API request to exchange access key"
    
        while [[ $attempt -le $MAX_RETRIES ]]; do
            log_info "API request attempt $attempt of $MAX_RETRIES"
    
            local response
            local http_code
    
            # Make request with timeout and capture both response and HTTP code
            if response=$(curl -s -w "\n%{http_code}" \
                --max-time "$TIMEOUT" \
                --retry 0 \
                -X POST "${AUTH_BASE_URL}/v1/auth/accesskey/exchange" \
                -H "Authorization: Bearer ${client_id}:${access_key}" \
                -H "Content-Type: application/json" 2>/dev/null); then
    
                http_code=$(echo "$response" | tail -n1)
                response=$(echo "$response" | head -n -1)
    
                log_debug "HTTP response code: $http_code"
                log_debug "Response body: $response"
    
                if [[ "$http_code" -eq 200 ]]; then
                    # Validate JSON response
                    if echo "$response" | jq empty 2>/dev/null; then
                        log_info "API request successful"
                        echo "$response"
                        return 0
                    else
                        log_error "Invalid JSON response received"
                    fi
                else
                    log_error "API request failed with HTTP code: $http_code"
                fi
            else
                log_error "API request failed (network/timeout error)"
            fi
    
            if [[ $attempt -lt $MAX_RETRIES ]]; then
                log_info "Retrying in ${RETRY_DELAY} seconds..."
                sleep "$RETRY_DELAY"
            fi
    
            ((attempt++))
        done
    
        log_error "API request failed after $MAX_RETRIES attempts"
        return 1
    }
    
    decode_jwt_payload() {
        local jwt="$1"
    
        log_debug "Decoding JWT payload"
    
        if [[ -z "$jwt" || "$jwt" == "null" ]]; then
            log_error "JWT is empty or null"
            return 1
        fi
    
        # Extract payload (second part after splitting by '.')
        local payload
        payload=$(echo "$jwt" | cut -d. -f2)
    
        if [[ -z "$payload" ]]; then
            log_error "Failed to extract JWT payload"
            return 1
        fi
    
        # Add base64 padding if needed
        local padding=$((4 - ${#payload} % 4))
        if [[ $padding -ne 4 ]]; then
            payload="${payload}$(printf '=%.0s' $(seq 1 $padding))"
        fi
    
        # Decode base64 and validate JSON
        local decoded
        if decoded=$(echo "$payload" | base64 -d 2>/dev/null); then
            if echo "$decoded" | jq empty 2>/dev/null; then
                log_debug "JWT payload decoded successfully"
                echo "$decoded"
                return 0
            else
                log_error "Decoded JWT payload is not valid JSON"
            fi
        else
            log_error "Failed to decode JWT payload from base64"
        fi
    
        return 1
    }
    
    extract_tenant_info() {
        local jwt_payload="$1"
    
        log_info "Extracting tenant information from JWT payload"
    
        # Extract project ID
        local project_id
        project_id=$(echo "$jwt_payload" | jq -r '.project_id // empty')
        if [[ -z "$project_id" || "$project_id" == "null" ]]; then
            log_error "Failed to extract project_id from JWT payload"
            return 1
        fi
    
        # Extract tenant information
        local tenants_json
        tenants_json=$(echo "$jwt_payload" | jq '.tenants // {}')
    
        local tenant_count
        tenant_count=$(echo "$tenants_json" | jq 'keys | length')
    
        if [[ "$tenant_count" -eq 0 ]]; then
            log_error "No tenants found in JWT payload"
            return 1
        fi
    
        local tenant_id
        tenant_id=$(echo "$tenants_json" | jq -r 'keys[0] // empty')
    
        if [[ -z "$tenant_id" || "$tenant_id" == "null" ]]; then
            log_error "Failed to extract tenant_id from JWT payload"
            return 1
        fi
    
        log_info "Tenant information extracted successfully"
        log_info "Project ID: $project_id"
        log_info "Tenant ID: $tenant_id"
        log_info "Tenant count: $tenant_count"
    
        # Export environment variables
        export MIGGO_PROJECT_ID="$project_id"
        export MIGGO_TENANT_ID="$tenant_id"
    
        return 0
    }
    
    generate_config() {
        log_info "Generating configuration file"
        log_info "Template: ${CONFIG_TEMPLATE_PATH}"
        log_info "Output: ${CONFIG_OUTPUT_PATH}"
    
        # Validate required environment variables are set
        if [[ -z "${MIGGO_PROJECT_ID:-}" || -z "${MIGGO_TENANT_ID:-}" ]]; then
            log_error "Required environment variables MIGGO_PROJECT_ID or MIGGO_TENANT_ID not set"
            return 1
        fi
    
        # Create temporary file for safer operation
        local temp_file
        temp_file=$(mktemp) || {
            log_error "Failed to create temporary file"
            return 1
        }
    
        # Generate config with error handling
        if envsubst < "${CONFIG_TEMPLATE_PATH}" > "$temp_file"; then
            # Validate generated config is not empty
            if [[ -s "$temp_file" ]]; then
                # Move to final location
                if mv "$temp_file" "${CONFIG_OUTPUT_PATH}"; then
                    log_info "Configuration file generated successfully"
                    return 0
                else
                    log_error "Failed to move generated config to final location"
                fi
            else
                log_error "Generated configuration file is empty"
            fi
        else
            log_error "Failed to process configuration template"
        fi
    
        # Cleanup on failure
        rm -f "$temp_file"
        return 1
    }
    
    oauth2_get_token() {
        local client_id="$1"
        local client_secret="$2"
        local token_url="$3"
        local attempt=1
    
        while [[ $attempt -le $MAX_RETRIES ]]; do
            log_info "Requesting authentication token attempt $attempt of $MAX_RETRIES"
    
            local response
            local http_code
    
            if response=$(curl -s -w "\n%{http_code}" \
                --max-time "$TIMEOUT" \
                --retry 0 \
                -X POST "$token_url" \
                -u "${client_id}:${client_secret}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials" 2>/dev/null); then
    
                http_code=$(echo "$response" | tail -n1)
                response=$(echo "$response" | head -n -1)
    
                log_debug "HTTP response code: $http_code"
                log_debug "Response body: $response"
    
                if [[ "$http_code" -eq 200 ]]; then
                    if echo "$response" | jq empty 2>/dev/null; then
                        local access_token
                        access_token=$(echo "$response" | jq -r '.access_token // empty')
    
                        if [[ -n "$access_token" && "$access_token" != "null" ]]; then
                            log_info "Authentication token obtained successfully"
                            echo "$access_token"
                            return 0
                        else
                            log_error "Authentication response missing access token"
                        fi
                    else
                        log_error "Invalid authentication response received"
                    fi
                else
                    log_error "Authentication failed with HTTP code: $http_code"
                fi
            else
                log_error "Authentication request failed (network/timeout error)"
            fi
    
            log_info "Retrying in ${RETRY_DELAY} seconds..."
            sleep "$RETRY_DELAY"
    
            ((attempt++))
        done
    
        log_error "Authentication failed after $MAX_RETRIES attempts"
        return 1
    }
    
    check_backend_health() {
        local api_url="$1"
        local access_token="$2"
        local attempt=1
    
        while true; do
            log_info "Verifying backend connectivity attempt $attempt - $api_url"
    
            local http_code
    
            if http_code=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time "$TIMEOUT" \
                --retry 0 \
                -X GET "$api_url" \
                -H "Authorization: Bearer ${access_token}" 2>/dev/null); then
    
                log_debug "Backend response code: $http_code"
    
                if [[ "$http_code" -ge 200 && "$http_code" -lt 500 ]]; then
                    log_info "Backend connectivity verified successfully (HTTP $http_code)"
                    return 0
                else
                    log_error "Backend connectivity check failed with HTTP code: $http_code"
                fi
            else
                log_error "Backend connectivity check failed (network/timeout error)"
            fi
    
            log_info "Retrying in ${RETRY_DELAY} seconds..."
            sleep "$RETRY_DELAY"
    
            ((attempt++))
        done
    }
    
    check_connectivity() {
    
        local token_url="${OAUTH2_TOKEN_URL:-https://auth.miggo.io/oauth2/v1/token}"
        local api_url="${API_HEALTH_URL:-https://api.miggo.io/health/status}"
    
        log_info "Starting backend connectivity verification"
        log_info "Token URL: $token_url"
        log_info "Backend URL: $api_url"
    
        local client_secret
        client_secret=$(read_access_key) || {
            log_error "Failed to read client credentials"
            return 1
        }
    
        local access_token
        access_token=$(oauth2_get_token "$CLIENT_ID" "$client_secret" "$token_url") || {
            log_error "Failed to authenticate with backend"
            return 1
        }
    
        check_backend_health "$api_url" "$access_token" || {
            log_error "Backend connectivity verification failed"
            return 1
        }
    
        log_info "Backend connectivity verification completed successfully"
        return 0
    }
    
    main() {
        log_info "Starting collector initialization"
    
        # Set configuration from Helm values (these would be set by the container)
        readonly CLIENT_ID="${CLIENT_ID:-}"
        readonly ACCESS_KEY_MOUNT_LOCATION="${ACCESS_KEY_MOUNT_LOCATION:-/var/secrets/access-key}"
        readonly CONFIG_TEMPLATE_PATH="${CONFIG_TEMPLATE_PATH:-/etc/collector-cm/config-template.yaml}"
        readonly CONFIG_OUTPUT_PATH="${CONFIG_OUTPUT_PATH:-/etc/collector/config.yaml}"
    
        # Validate environment
        validate_environment || {
            log_error "Environment validation failed"
            return 1
        }
    
        # Read access key
        local access_key
        access_key=$(read_access_key) || {
            log_error "Failed to read access key"
            return 1
        }
    
        # Make API request
        local api_response
        api_response=$(make_api_request "$CLIENT_ID" "$access_key") || {
            log_error "API request failed"
            return 1
        }
    
        # Extract JWT from response
        local jwt
        jwt=$(echo "$api_response" | jq -r '.sessionJwt // empty')
        if [[ -z "$jwt" || "$jwt" == "null" ]]; then
            log_error "Failed to extract sessionJwt from API response"
            return 1
        fi
    
        # Decode JWT payload
        local jwt_payload
        jwt_payload=$(decode_jwt_payload "$jwt") || {
            log_error "Failed to decode JWT payload"
            return 1
        }
    
        # Extract tenant information
        extract_tenant_info "$jwt_payload" || {
            log_error "Failed to extract tenant information"
            return 1
        }
    
        # Generate configuration file
        generate_config || {
            log_error "Failed to generate configuration file"
            return 1
        }
    
        # Verify Backend health
        check_connectivity || {
            log_error "Backend unreachable"
            return 1
        }
    
        log_info "Collector initialization completed successfully"
        return 0
    }
    
    # Execute main function if script is run directly
    if [[ "${BASH_SOURCE[0]}" == "${0}" ]]; then
        main "$@"
    fi
    

  config-template.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:6666
      oauth2client:
        client_id: P2UjsJwOFdIeUAtW0pGTJ5SeJAlq
        client_secret_file: /etc/miggo-access-key
        token_url: https://auth.miggo.io/oauth2/v1/token
        timeout: 1m
      k8s_leader_elector:
        auth_type: serviceAccount
        lease_name: example-collector
        lease_namespace: default

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

      prometheus:
        config:
          scrape_configs:
            - job_name: 'collector'
              scrape_interval: 60s
              static_configs:
                - targets: [ 'localhost:8888' ]
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'otelcol_(.*)'
                  target_label: __name__
                  replacement: 'miggocol_$1'
                - target_label: "tenant-id"
                  replacement: "${MIGGO_TENANT_ID}"
                - target_label: "project-id"
                  replacement: "${MIGGO_PROJECT_ID}"
                - target_label: "miggo-name"
                  replacement: "my-cluster"
                - target_label: "node-name"
                  replacement: "${env:NODE_NAME}"
                - target_label: "deployment-type"
                  replacement: "deployment"

      k8s_cluster:
        k8s_leader_elector: k8s_leader_elector
        collection_interval: 60s
        auth_type: serviceAccount          # or kubeConfig for local dev
        allocatable_types_to_report:
          - cpu
          - memory
        metrics:
          k8s.pod.status_reason:
            enabled: true
          k8s.container.status.reason:
            enabled: true
        namespaces:
          - default

    processors:
      resource:
        attributes:
          - key: project
            value: "${MIGGO_PROJECT_ID}"
            action: insert
          - key: tenant
            value: "${MIGGO_TENANT_ID}"
            action: insert

      attributes:
        actions:
          - key: project
            value: "${MIGGO_PROJECT_ID}"
            action: insert
          - key: tenant
            value: "${MIGGO_TENANT_ID}"
            action: insert

      resource/metrics:
        attributes:
          - key: project-id
            value: "${MIGGO_PROJECT_ID}"
            action: insert
          - key: tenant-id
            value: "${MIGGO_TENANT_ID}"
            action: insert

      attributes/metrics:
        actions:
          - key: project-id
            value: "${MIGGO_PROJECT_ID}"
            action: insert
          - key: tenant-id
            value: "${MIGGO_TENANT_ID}"
            action: insert

      metricstransform:
        transforms:
          - include: miggocol_process_uptime_seconds_total
            match_type: strict
            new_name: miggo_component_status
            action: combine
            operations:
              - action: add_label
                new_label: component
                new_value: Miggo Collector
              - action: add_label
                new_label: chart_version
                new_value: 0.0.183

      batch/metrics:
        timeout: 10s

      batch/logs:
        timeout: 10s

      batch/traces:
        timeout: 10s

      transform/k8s_metric:
        metric_statements:
        - context: metric
          statements:
            - set(name, Concat(["miggocol", name], "."))
        - context: datapoint
          statements:
            - merge_maps(attributes, resource.attributes, "insert")
            - set(attributes["miggo-name"], "my-cluster")
            - set(attributes["pod.hostname"], attributes["k8s.pod.name"])
            - delete_key(attributes, "k8s.pod.name")
            - set(attributes["node.name"], attributes["k8s.node.name"])
            - delete_key(attributes, "k8s.node.name")

    exporters:
      debug:
        verbosity: 

      prometheus:
        endpoint: 0.0.0.0:8889

      otlphttp:
        traces_endpoint: https://collector.miggo.io/v1/traces
        metrics_endpoint: https://collector.miggo.io/v1/metrics
        logs_endpoint: https://collector.miggo.io/v1/logs
        auth:
          authenticator: oauth2client
      otlphttp/profiles:
        endpoint: https://collector.miggo.io
        auth:
          authenticator: oauth2client

    service:
      telemetry:
        metrics:
          level: detailed
          readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888
      extensions:
        - health_check
        - oauth2client
        - k8s_leader_elector
      pipelines:
        profiles:
          receivers:
            - otlp
          exporters:
            - otlphttp/profiles
        metrics/sensors:
          receivers:
            - otlp
          processors:
            - batch/metrics
            - resource/metrics
            - attributes/metrics
          exporters:
            - debug
            - prometheus
            - otlphttp
        metrics/collector:
          receivers:
            - prometheus
          processors:
            - batch/metrics
            - metricstransform
            - resource/metrics
            - attributes/metrics
          exporters:
            - debug
            - prometheus
            - otlphttp

        metrics/k8s:
          receivers:
            - k8s_cluster
          processors:
            - batch/metrics
            - resource/metrics
            - attributes/metrics
            - transform/k8s_metric
          exporters:
            - prometheus
            - otlphttp

        traces:
          receivers:
            - otlp
          processors:
            - batch/traces
            - resource
            - attributes
          exporters:
            - debug
            - otlphttp
        logs:
          receivers:
            - otlp
          processors:
            - batch/logs
            - resource
            - attributes
          exporters:
            - debug
            - otlphttp
