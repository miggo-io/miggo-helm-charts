---
# Source: miggo/templates/miggo-watch/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-watch
  namespace: default
  labels:
    helm.sh/chart: miggo-0.0.219
    app.kubernetes.io/name: miggo
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "v26.617.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: miggo-watch
      app.kubernetes.io/instance: example
  template:
    metadata:
      annotations:
        checksum/values: 1340781c178920c063a0db3c7f46bf0f746116d7237cb3c59ddd45fc41a48c86
      labels:
        component: miggo-watch
        helm.sh/chart: miggo-0.0.219
        app.kubernetes.io/name: miggo-watch
        app.kubernetes.io/instance: example
        app.kubernetes.io/version: "v26.617.1"
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        
        - name: miggo-regcred
      serviceAccountName: example-watch
      containers:
        - name: miggo-watch
          securityContext:
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          image: "registry.miggo.io/miggo/miggo-watch:v26.617.1"
          imagePullPolicy: IfNotPresent
          args:
            - --cluster-name=my-cluster
            - --otlp-endpoint=http://miggo-collector.default.svc.cluster.local:4318
            - --collector-healthcheck-port=6666
            - --tls-skip-verify=false
            - --stdout=false
            - --port=6666
            - --metric-otlp-endpoint=http://miggo-collector.default.svc.cluster.local:4318
            - --metric-tls-skip-verify=false
            - --metric-interval=60s
            - --chart-version=0.0.219
            - --interval=1h
            - --image-tracker-interval=1h
            - --exclude=pod,replica-set
            
            - --include-system-namespaces=false
            - --denied-namespaces=default
            - --original-sensor-helm-values=/etc/miggo/values/defaults.yaml
            - --rendered-sensor-helm-values=/etc/miggo/values/rendered.yaml
          envFrom:
          env:
            - name: MIGGO_WATCH_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MIGGO_WATCH_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GOMEMLIMIT
              value: "204MiB"
          ports:
          - containerPort: 6666
          livenessProbe:
            httpGet:
              path: /health
              port: 6666
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 6666
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 256Mi
          volumeMounts:
          - name: miggo-values-rendered
            mountPath: /etc/miggo/values/rendered.yaml
            subPath: rendered.yaml
          - name: miggo-values-defaults
            mountPath: /etc/miggo/values/defaults.yaml
            subPath: defaults.yaml
      volumes:
      - name: miggo-values-rendered
        configMap:
          name: miggo-values-rendered
      - name: miggo-values-defaults
        configMap:
          name: miggo-values-defaults
      nodeSelector:
        kubernetes.io/os: linux


