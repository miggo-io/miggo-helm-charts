# -- Override the namespace where resources are deployed. If not set, uses Release.Namespace
namespaceOverride: ""

# -- Docker registry settings
image:
  # -- Registry host for all images
  registry: registry.miggo.io
  # -- Image pull policy for all images
  pullPolicy: IfNotPresent

## -- List of secrets to use for pulling images from authenticated repositories
imagePullSecrets: []
  # -- Name of the image pull secret
  # - name: ""

miggo:
  # -- Name of the Kubernetes cluster
  clusterName: "kubernetes-cluster"

healthcheck:
  # -- Port number for health check endpoints
  port: 6666

probes:
  # -- Timeout seconds for liveness and readiness probes across all components
  timeoutSeconds: 10
  # -- Failure threshold for liveness and readiness probes across all components
  failureThreshold: 5

config:
  # -- The Kubernetes platform acronym. Allowed values are:
  # - gke: Google Kubernetes Engine
  # - openshift: Red Hat OpenShift/OCP
  platform: ""
  metrics:
    # -- Interval for metrics collection
    interval: 60s

  # -- Client ID for authentication
  clientId: P2UjsJwOFdIeUAtW0pGTJ5SeJAlq

  # -- Base URL for the authentication service (Descope)
  authUrl: "https://auth.miggo.io"

  # -- Upstream URL where the in-cluster miggo-collector forwards OTel data.
  # Takes precedence over the deprecated output.otlp.otlpEndpoint.
  collectorUrl: "https://collector.miggo.io"

  # -- OBSOLETE: no longer consumed. Sensor components no longer call the Miggo
  # backend API directly (auth + attribution are handled by the SaaS collector
  # via OAuth2/JWT). Kept for backward compatibility; setting it has no effect.
  apiUrl: "https://api.miggo.io"

  # -- Access key for authentication (ignored when accessKeySecret is specified)
  accessKey: ""

  # -- Name of the secret containing the access key. Leave empty to create default secrets based on config.accessKey
  accessKeySecret: ""

  # -- List of namespaces that are allowed to be processed
  # If empty, all namespaces are included by default (before applying deniedNamespaces)
  # Example: ["development", "staging", "production"]
  allowedNamespaces:

  # -- List of namespaces that should be excluded from processing
  # Takes precedence over allowedNamespaces - if a namespace is both allowed and denied,
  # it will be denied
  # Example: ["test", "deprecated"]
  deniedNamespaces:

  # -- When set to true, includes system namespaces like kube-system etc.
  # When false (default), automatically adds system namespaces to deniedNamespaces
  # It's recommended to keep this false unless you specifically need to operate on system namespaces
  includeSystemNamespaces: false

output:
  # -- Enable stdout logging (for debugging)
  stdout: false

  otlp:
    # -- Deprecated. Use config.collectorUrl instead. Consulted only as a
    # fallback when config.collectorUrl is unset, for backward compatibility.
    otlpEndpoint: ""
    # -- Skip TLS verification
    tlsSkipVerify: false

  # OBSOLETE: sensor components no longer call the Miggo backend API (auth +
  # attribution are handled by the SaaS collector via OAuth2/JWT). These fields
  # are no longer consumed; kept for backward compatibility, setting them has no effect.
  api:
    # -- OBSOLETE: no longer consumed.
    enabled: true
    # -- OBSOLETE: no longer consumed.
    apiEndpoint: ""

serviceAccount:
  # -- Automatically mount API credentials for the service account
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- Name of the service account. If not set, a name is generated
  name: ""

# -- Global labels to add to all resources
labels: {}
# -- Global annotations to add to all resources
annotations: {}
# -- Pod annotations to add to all pods
podAnnotations: {}
# -- Pod labels to add to all pods
podLabels: {}
# -- Enable Miggo-managed security contexts for all sensor pods/containers. When true
# (default): non-privileged components (collector/watch/scanner) run as 65532:65532 with
# runAsNonRoot, the collector pod gets fsGroup 65532, and the privileged runtime pod is
# pinned to an explicit 0:0. When false: no securityContext is rendered at all (the managed
# values and the deprecated fields below are both suppressed) and pods fall back to implicit root.
manageSecurityContext: true
# -- DEPRECATED: superseded by manageSecurityContext. While manageSecurityContext is true, a
# populated value here overrides the managed pod security context for all pods.
podSecurityContext: {}
# -- DEPRECATED: superseded by manageSecurityContext. While manageSecurityContext is true, a
# populated value here overrides the managed container security context for all containers.
securityContext: {}
# -- Additional environment variables for all containers
extraEnvs: []
# -- Additional environment variables from sources for all containers
extraEnvsFrom: []
# -- Additional volumes for all pods
volumes: []
# -- Additional volume mounts for all containers
volumeMounts: []
# -- Node selector for all pods
nodeSelector: {}
# -- Tolerations for all pods
tolerations: []
# -- Pod affinity settings for all pods
affinity: {}
# -- Priority class name for all pods
priorityClassName: ""

miggoWatch:
  # -- Enable Miggo Watch component
  enabled: true
  # -- Component-specific labels
  labels: {}
  # -- Component-specific annotations
  annotations: {}
  # -- Component-specific pod annotations
  podAnnotations: {}
  # -- Component-specific pod labels
  podLabels: {}
  # -- Additional environment variables
  extraEnvs: []
  # -- Additional environment variables from sources
  extraEnvsFrom: []
  # -- Additional volumes
  volumes: []
  # -- Additional volume mounts
  volumeMounts: []
  # -- Node selector for miggo-watch pods. Merged with global nodeSelector.
  nodeSelector:
    kubernetes.io/os: linux

  image:
    # -- Image repository
    repository: miggo/miggo-watch
    # -- Image tag (defaults to Chart appVersion if not set)
    tag:
    # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
    # Useful for local development with Minikube or when needing to specify a complete custom image path
    fullPath:
    # -- Image pull policy. Specifies when Kubernetes should pull the container image
    pullPolicy:

  config:
    # -- Interval for scanning Kubernetes resources
    interval: 1h
    # -- Interval for sending a snapshot of cluster images
    imageTrackerInterval: 1h
    # -- Disable compression for data transfer
    disableCompression: false
    # -- Exclude those components from the report (comma separated list of persistent-volume-claim daemon-set stateful-set ingress ingress-class http-route network-policy namespace service-account persistent-volume cron-job node deployment job replica-set gateway-class pod service)
    exclude: "pod,replica-set"

  # -- When enabled, the chart will set the GOMEMLIMIT env var to 80% of the
  # configured resources.limits.memory. If no resources.limits.memory are
  # defined then enabling does nothing. It is HIGHLY recommend to enable this
  # setting and set a value for resources.limits.memory.
  useGOMEMLIMIT: true

  resources:
    limits:
      cpu: 100m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 256Mi

  probes:
    # -- Override global probes.timeoutSeconds for miggo-watch
    timeoutSeconds: ""
    # -- Override global probes.failureThreshold for miggo-watch
    failureThreshold: ""

miggoScanner:
  # -- Enable Miggo Scanner component
  enabled: true
  # -- Enable resolution of imagePullSecrets for scanning images from
  # -- private container registries. When enabled, the scanner's
  # -- ClusterRole grants get/list/watch on Kubernetes Secrets so it can
  # -- authenticate to private registries that workloads reference via
  # -- imagePullSecrets on pods or service accounts. Disable on clusters
  # -- that don't use imagePullSecrets or that prefer not to grant the
  # -- sensor cluster-wide secrets-read; the scanner falls back to
  # -- anonymous + creds-helpers auth and emits a warning per affected
  # -- pod in its logs.
  imagePullSecretScanning:
    enabled: true
  # -- Provided registry credentials for scanning images from private registries
  # -- that workload pods do not reference via imagePullSecrets. Set secretName to the
  # -- name of a kubernetes.io/dockerconfigjson secret in the scanner's namespace; the
  # -- scanner mounts its .dockerconfigjson key and tries those credentials first,
  # -- falling back to imagePullSecrets-derived and anonymous auth.
  registryCredentials:
    secretName: ""
  # -- Component-specific labels
  labels: {}
  # -- Component-specific annotations
  annotations: {}
  # -- Component-specific pod annotations
  podAnnotations: {}
  # -- Component-specific pod labels
  podLabels: {}
  # -- Additional environment variables
  extraEnvs: []
  # -- Additional environment variables from sources
  extraEnvsFrom: []
  # -- Additional volumes
  volumes: []
  # -- Additional volume mounts
  volumeMounts: []
  # -- Node selector for miggo-scanner pods. Merged with global nodeSelector.
  nodeSelector:
    kubernetes.io/os: linux

  serviceAccount:
    # -- Annotations to add to the service account
    annotations: {}

  image:
    # -- Image repository
    repository: miggo/miggo-scanner
    # -- Image tag (defaults to Chart appVersion if not set)
    tag:
    # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
    # Useful for local development with Minikube or when needing to specify a complete custom image path
    fullPath:
    # -- Image pull policy. Specifies when Kubernetes should pull the container image
    pullPolicy:

  config:
    # -- Max limit of the processing queue
    queueSize: 10000
    # -- Disable compression for data transfer
    disableCompression: false

    cache:
      # -- Max age of a cache entry before it is removed (0 to disable)
      flushInterval: "168h"
      # -- How often to scan and remove stale cache entries (0 to disable)
      cleanupInterval: "15m"
      # -- Maximum number of entries in cache
      maxEntries: 10000

      configMap:
        # -- Enable persisted ConfigMap based cache
        enabled: true
        # -- Name of the ConfigMap (generated if not set)
        name: ""

  # -- When enabled, the chart will set the GOMEMLIMIT env var to 80% of the
  # configured resources.limits.memory. If no resources.limits.memory are
  # defined then enabling does nothing. It is HIGHLY recommend to enable this
  # setting and set a value for resources.limits.memory.
  useGOMEMLIMIT: true

  resources:
    limits:
      cpu: 3000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi

  probes:
    # -- Override global probes.timeoutSeconds for miggo-scanner
    timeoutSeconds: ""
    # -- Override global probes.failureThreshold for miggo-scanner
    failureThreshold: ""

miggoRuntime:
  # -- Install eBPF agent on each cluster node to provide package-level
  # reachability analysis and other runtime insights.
  enabled: false
  # -- Kubernetes cluster domain
  kubernetesClusterDomain: ""
  # -- Priority class name (defaults to global priorityClassName or system-node-critical)
  priorityClassName: ""
  # -- Enable tracing network connections.
  enableNetworkTracing: false
  # -- Enable tracing file access.
  enableFileAccessTracing: false
  # -- Enable web app process detection.
  enableWebAppProcessDetection: true
  # -- Interval between full cgroup state syncs from the Runtime to the Profiler
  cgroupRegistrySyncInterval: 1m
  # -- Interval between sweeps to remove cgroups whose paths no longer exist on the filesystem
  cgroupRegistryCleanInterval: 1h
  # -- Additional environment variables
  extraEnvs: []
  # -- Additional environment variables from sources
  extraEnvsFrom: []
  volumes: []
  # -- Additional volume mounts for all containers
  volumeMounts: []

  image:
    # -- Image repository
    repository: miggo/miggo-runtime
    # -- Image tag (defaults to Chart appVersion if not set)
    tag:
    # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
    # Useful for local development with Minikube or when needing to specify a complete custom image path
    fullPath:
    # -- Image pull policy. Specifies when Kubernetes should pull the container image
    pullPolicy:

  # -- Node selector settings
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the miggo-runtime DaemonSet.  Global tolerations specified in
  # .Values.tolerations will be merged with this list.
  tolerations: []

  # -- Affinity settings for the miggo-runtime DaemonSet. Global affinity specified in
  # .Values.affinity will be merged with this configuration.
  affinity: {}

  # -- When enabled, the chart will set the GOMEMLIMIT env var to 80% of the
  # configured resources.limits.memory. If no resources.limits.memory are
  # defined then enabling does nothing. It is HIGHLY recommend to enable this
  # setting and set a value for resources.limits.memory.
  useGOMEMLIMIT: true

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi

  probes:
    # -- Override global probes.timeoutSeconds for miggo-runtime
    timeoutSeconds: ""
    # -- Override global probes.failureThreshold for miggo-runtime
    failureThreshold: ""

  securityContext:
    privileged: true

  # -- Use the host's pid namespace.
  hostPID: true
  # -- Use the host's ipc namespace.
  hostIPC: true

  profiler:
    # -- Install profiler on each cluster node to provide function-level
    # reachability analysis and other runtime insights.
    enabled: true
    image:
      # -- Image repository
      repository: miggo/miggo-profiler
      # -- Image tag (defaults to Chart appVersion if not set)
      tag:
      # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
      # Useful for local development with Minikube or when needing to specify a complete custom image path
      fullPath:
      # -- Image pull policy. Specifies when Kubernetes should pull the container image
      pullPolicy:

    # -- When enabled, the chart will set the GOMEMLIMIT env var to 80% of the
    # configured resources.limits.memory. If no resources.limits.memory are
    # defined then enabling does nothing. It is HIGHLY recommend to enable this
    # setting and set a value for resources.limits.memory.
    useGOMEMLIMIT: true

    # -- Specifies which tracers should be enabled in the profiler.
    # The following tracers are currently supported:
    # `perl`, `php`, `python`, `hotspot`, `ruby`, `v8`, `dotnet`, `go`, `labels`
    enabledTracers: [perl, php, python, hotspot, v8, go]

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi

    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
      capabilities:
        add:
          - SYS_ADMIN

    # -- Set the reporter's interval in seconds.
    reporterInterval: 5s
    # -- Set the frequency (in Hz) of stack trace sampling.
    samplesPerSecond: 20
    # -- Set the monitor interval in seconds.
    monitorInterval: 5s

    # --  If set to a value between 1 and 99 will enable probabilistic
    # profiling: every probabilistic-interval a random number between 0 and 99
    # is chosen. If the given probabilistic-threshold is greater than this
    # random number, the agent will collect profiles from this system for the
    # duration of the interval.
    probabilisticThreshold: 100
    # -- Time interval for which probabilistic profiling will be enabled or disabled.
    probabilisticInterval: 1m0s
    # -- Enables namespace-based filtering for the profiler. When enabled, the profiler
    # applies allowedNamespaces and deniedNamespaces configuration to selectively
    # collect profiles based on Kubernetes namespace membership.
    # Note: This feature only works on cgroupv2 systems.
    enableNamespaceFiltering: true

    dotnet:
      # -- Max entries in the PE info LRU cache (MIGGO_DOTNET_PE_CACHE_SIZE). Leave empty to use the profiler default.
      peCacheSize:
      # -- TTL for entries in the PE info LRU cache (MIGGO_DOTNET_PE_CACHE_TTL), e.g. "5m". Leave empty to use the profiler default.
      peCacheTTL:
      # -- Max entries in the PE strings LRU cache (MIGGO_DOTNET_STRINGS_CACHE_SIZE). Leave empty to use the profiler default.
      stringsCacheSize:
      # -- TTL for entries in the PE strings LRU cache (MIGGO_DOTNET_STRINGS_CACHE_TTL), e.g. "10m". Leave empty to use the profiler default.
      stringsCacheTTL:

  fluentbit:
    # -- Install fluent-bit on each cluster node to forward the profiler logs to the Collector
    enabled: true

    image:
      # -- Image repository for fluent-bit. Public Docker Hub image; NOT prefixed with the global image.registry.
      repository: fluent/fluent-bit
      # -- Image tag for fluent-bit. Pinned to 5.0 (floating patch within 5.0.x) for stability; bump deliberately.
      tag: "5.0"
      # -- Optional full image path override. If set, takes precedence over repository/tag.
      fullPath:
      # -- Image pull policy. Specifies when Kubernetes should pull the container image
      pullPolicy:

    resources:
      requests:
        memory: "50Mi"
        cpu: "50m"
      limits:
        memory: "100Mi"
        cpu: "100m"

miggoOntime:
  # -- Install the OnTime runtime detection agent on each cluster node. OnTime runs
  # in parallel to the Runtime and Profiler and submits detection events to the
  # Collector. It depends only on the Collector, not on miggoRuntime, so it is gated
  # independently.
  enabled: false

  image:
    # -- Image repository
    repository: miggo/miggo-ontime
    # -- Image tag. Defaults to "latest" — OnTime releases on its own version line
    # (v0.0.x), independent of the chart appVersion. Pin to a specific tag for production.
    tag:
    # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
    # Useful for local development with Minikube or when needing to specify a complete custom image path
    fullPath:
    # -- Image pull policy. Specifies when Kubernetes should pull the container image
    pullPolicy:

  #### OnTime config. The chart renders /etc/ontime/config.yaml and passes it via
  #### --config. Structural defaults (intervals, caches, functionalities) are fixed
  #### by the chart; the tunables below are what you normally change. The OTel sink
  #### endpoint is wired by the chart to the in-cluster Collector.

  # -- OnTime log level: info, debug, warn, error
  logLevel: info

  # -- OnTime features to enable (see the OnTime config reference)
  features:
    - hold
    - procfs
    - detect
    - detections
    - enricher

  # -- Detection recipes (events) to enable. Mirrors the OnTime standalone config
  # catalog, grouped by detection method; everything is commented out except the
  # single POC detection (cloud_meta_probe). Uncomment entries to enable more —
  # OnTime has no compile-time block list, so any listed recipe is enabled.
  # net_flow / fw_drop are telemetry (not detections) and stay off by default.
  events:
    # Informational / telemetry events.
    # - fw_drop
    # - net_flow
    # - sys_profile

    # Detection recipes for file access patterns.
    # - file_example
    # - log_wipe
    # - self_delete
    # - cap_modify
    # - proc_mem_write
    # - core_path_write
    # - cpu_probe
    # - cred_file_access
    # - miner_drop
    # - proc_env_read
    # - fs_probe
    # - shlib_write
    # - jvm_debug_inject
    # - jvm_agent_inject
    # - hw_probe
    # - os_probe
    # - net_if_probe
    # - sys_state_probe
    # - repo_cfg_write
    # - pam_cfg_write
    # - sched_debug_probe
    # - shell_cfg_write
    # - tls_cert_read
    # - sudo_cfg_write
    # - sysrq_probe
    # - bpf_cfg_read
    # - kern_prot_bypass

    # Detection recipes for execution patterns.
    # - exec_example
    # - loader_exec
    # - jit_exec
    # - cred_grep
    # - miner_exec
    # - encoder_exec
    # - dos_tool
    # - odd_path_exec
    # - file_flags_set
    # - stealth_exec
    # - interp_to_shell
    # - exfil_tool
    # - mitm_tool
    # - scan_tool
    # - sniffer_tool
    # - net_offens_tool
    # - passwd_run
    # - ctr_escape
    # - webshell_exec
    # - webshell_spawn

    # Detection recipes for environment variable patterns.
    # - ld_preload_abuse

    # Detection recipes for network peer patterns.
    - cloud_meta_probe  # enabled by default for the POC
    # - peer_example
    # - adult_domain
    # - dga_domain
    # - dga_domain_light
    # - badware_domain
    # - dyndns_domain
    # - typosquat_domain
    # - gambling_domain
    # - gambling_domain_light
    # - new_domain
    # - new_domain_light
    # - phish_domain
    # - phish_domain_light
    # - piracy_domain
    # - plaintext_proto
    # - c2_domain
    # - c2_domain_light
    # - c2_domain_medium
    # - tracker_domain
    # - vpn_bypass_domain

    # Detections with specific eBPF logic (kernel LCE). Enable only on matching
    # vulnerable kernels.
    # - copy_fail_attempt
    # - dirty_frag_attempt
    # - fragnesia_attempt
    # - ssh_keysign_pwn_attempt
    # - dirty_cbc_attempt
    # - pin_theft_attempt
    # - nft_catchall_uaf_attempt

  otel:
    # -- service.name attribute on emitted OTel records
    serviceName: miggo-ontime
    # -- Per-second caps for high-frequency observation events
    eventsPerSec:
      fw_drop: 100
      net_flow: 500

  health:
    # -- Run OnTime's internal health server and add an exec liveness/readiness probe
    # that checks it. The server binds 127.0.0.1:8082 (localhost only), so the probe
    # is an in-container `wget` exec rather than httpGet — once miggo-ontime can bind
    # the health server externally, this becomes a plain httpGet. Probe timeouts and
    # thresholds come from the global .Values.probes.
    enabled: true

  # -- Also send events to stdout (alongside the otel sink) for debugging.
  stdout: false

  # -- Free-form map deep-merged over the chart's rendered OnTime config. Use it to
  # tune any field not exposed as a first-class value above — intervals, caches,
  # internal-only features (inference / firewall / pipeline / retainer / github) and
  # their feature_options, extra sinks, per-event options, etc. Lists replace, maps
  # merge. The chart always re-asserts the otel sink endpoint, so overriding it has no
  # effect. See docs/miggo-ontime.md for worked examples.
  configOverrides: {}

  # -- Additional command-line arguments (e.g. network-flows, report). OnTime is
  # configured via the config file; these are extra flags only.
  extraArgs: {}
  # -- Additional environment variables
  extraEnvs: []
  # -- Additional environment variables from sources
  extraEnvsFrom: []
  # -- Additional volumes
  volumes: []
  # -- Additional volume mounts for all containers
  volumeMounts: []

  # -- Node selector settings
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the miggo-ontime DaemonSet. Global tolerations specified in
  # .Values.tolerations will be merged with this list.
  tolerations: []

  # -- Affinity settings for the miggo-ontime DaemonSet. Global affinity specified in
  # .Values.affinity will be merged with this configuration.
  affinity: {}

  # -- Priority class name (defaults to global priorityClassName or system-node-critical)
  priorityClassName: ""

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  securityContext:
    privileged: true

  # -- Use the host's pid namespace.
  hostPID: true
  # -- Use the host's ipc namespace.
  hostIPC: true

miggoCollector:
  # -- Enable Collector component
  enabled: true
  # -- Number of replicas to run (relevant only if instancePerNode: false)
  replicas: 1
  # -- Run an instance per node
  instancePerNode: false
  # -- Priority class name (defaults to global priorityClassName or system-node-critical)
  priorityClassName: ""
  # -- Component-specific labels
  labels: {}
  # -- Component-specific annotations
  annotations: {}
  # -- Component-specific pod annotations
  podAnnotations: {}
  # -- Component-specific pod labels
  podLabels: {}
  # -- Additional environment variables
  extraEnvs: []
  # -- Additional environment variables from sources
  extraEnvsFrom: []
  # -- Additional volumes
  volumes: []
  # -- Additional volume mounts
  volumeMounts: []
  # -- Node selector for miggo-collector pods. Merged with global nodeSelector.
  nodeSelector:
    kubernetes.io/os: linux
  # -- InitContainers to initialize the pod
  initContainers: []

  # -- Additional processor configurations
  extraProcessors: {}
  # -- Additional processor names to add to pipelines
  extraProcessorNames: []
  # -- Additional exporter configurations
  extraExporters: {}
  # -- Additional exporter names to add to pipelines
  extraExporterNames: []
  # -- Additional extension configurations
  extraExtensions: {}
  # -- Additional extension names to add to service
  extraExtensionNames: []

  # -- Additional OTel collector pipelines, rendered verbatim under
  # service.pipelines. Use this when you need a pipeline that is INDEPENDENT
  # of the chart's primary pipelines (e.g. mirroring telemetry to a second
  # tenant via a separate processor chain + exporter). The extras you wire
  # in here (extensions / processors / exporters) should be declared via the
  # corresponding `extra*` maps above; do NOT add them to the `*Names` lists
  # unless you want them appended to the primary pipelines as well. Empty
  # by default — the rendered config is byte-identical to the single-tenant
  # baseline when unset.
  extraPipelines: {}
  # extraPipelines:
  #   traces/prod:
  #     receivers: [otlp]
  #     processors: [batch/traces, resource/prod, attributes/prod]
  #     exporters: [otlphttp/prod]

  # -- An internal locaiton to mount the access key file within the container
  accessKeyMountLocation: /etc/miggo-access-key

  image:
    # -- Image repository
    repository: miggo/miggo-collector
    # -- Image tag (defaults to Chart appVersion if not set)
    tag:
    # -- Optional full image path override. If set, takes precedence over registry/repository/tag settings.
    # Useful for local development with Minikube or when needing to specify a complete custom image path
    fullPath:
    # -- Image pull policy. Specifies when Kubernetes should pull the container image
    pullPolicy:

  config:
    # -- Log verbosity level (`detailed`, `normal`, or `basic`)
    logVerbosity: basic
    # -- Telemetry log verbosity level (`INFO`, `DEBUG`, `WARN` or `ERROR`)
    internalLogVerbosity: INFO

  # -- When enabled, the chart will set the GOMEMLIMIT env var to 80% of the
  # configured resources.limits.memory. If no resources.limits.memory are
  # defined then enabling does nothing. It is HIGHLY recommend to enable this
  # setting and set a value for resources.limits.memory.
  useGOMEMLIMIT: true

  # -- Resource requirements
  resources:
    limits:
      cpu: 100m
      memory: 500Mi
    requests:
      cpu: 10m
      memory: 200Mi

  probes:
    # -- Override global probes.timeoutSeconds for miggo-collector
    timeoutSeconds: ""
    # -- Override global probes.failureThreshold for miggo-collector
    failureThreshold: ""

  service:
    # -- Service type
    type: ClusterIP
    # -- Service annotations
    annotations: {}
    # -- Service labels
