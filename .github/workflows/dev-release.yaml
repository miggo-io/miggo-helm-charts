name: Release Charts (Dev)

on:
  workflow_call:
    inputs:
      app_version:
        description: 'App version (appVersion in Chart.yaml)'
        required: true
        type: string
    outputs:
      chart_version:
        description: 'Released chart version'
        value: ${{ jobs.release.outputs.chart_version }}
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version (appVersion in Chart.yaml)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    
    outputs:
      chart_version: ${{ steps.version.outputs.chart_version }}

    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        if: vars.GH_MIGGO_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_MIGGO_APP_ID }}
          private-key: ${{ secrets.GH_MIGGO_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "miggo-helm-charts"
          
      - name: Set token for checkout
        id: set-token
        run: |
          if [ -n "${{ steps.generate-token.outputs.token }}" ]; then
            echo "checkout_token=${{ steps.generate-token.outputs.token }}" >> $GITHUB_OUTPUT
          else
            echo "checkout_token=${{ github.token }}" >> $GITHUB_OUTPUT
          fi
          
      - name: Checkout
        uses: actions/checkout@v7
        with:
          repository: miggo-io/miggo-helm-charts
          show-progress: false
          fetch-depth: 0
          token: "${{ steps.set-token.outputs.checkout_token }}"
          ref: 'main'
      
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Patch chart name and version for dev release
        id: version
        run: |
          SHA=$(git rev-parse --short HEAD)
          ORIGINAL_VERSION=$(grep '^version:' charts/miggo/Chart.yaml | awk '{print $2}')
          CHART_VERSION=${ORIGINAL_VERSION}-${{ inputs.app_version }}.${SHA}
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/miggo/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ inputs.app_version }}\"/" charts/miggo/Chart.yaml
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Copy default values for chart packaging
        # Helm excludes values.yaml from .Files, so we keep a copy in files/ that the
        # miggo-values-defaults ConfigMap template reads via .Files.Get. This step
        # produces it at package time so it never needs to be committed.
        run: cp charts/miggo/values.yaml charts/miggo/files/default-values.yaml

      - name: Run chart-releaser
        uses: ./.github/actions/helm-releaser
        with:
          charts_dir: charts
          repository: miggo-io/miggo-helm-charts
        env:
          CR_TOKEN: "${{ steps.set-token.outputs.checkout_token }}"
          CR_GENERATE_RELEASE_NOTES: true
