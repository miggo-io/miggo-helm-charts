name: Markdown Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.markdownlint.yaml'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yaml
          globs: '**/*.md'
