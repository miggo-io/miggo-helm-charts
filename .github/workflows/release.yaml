name: Release Charts

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        if: vars.GH_MIGGO_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_MIGGO_APP_ID }}
          private-key: ${{ secrets.GH_MIGGO_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "miggo-helm-charts"

      - name: Set token for checkout
        id: set-token
        run: |
          if [ -n "${{ steps.generate-token.outputs.token }}" ]; then
            echo "checkout_token=${{ steps.generate-token.outputs.token }}" >> $GITHUB_OUTPUT
          else
            echo "checkout_token=${{ github.token }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: miggo-io/miggo-helm-charts
          show-progress: false
          fetch-depth: 0
          token: "${{ steps.set-token.outputs.checkout_token }}"
          ref: 'main'

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.9.0

      - name: Run chart-releaser
        id: release
        uses: ./.github/actions/helm-releaser
        with:
          charts_dir: charts
          repository: miggo-io/miggo-helm-charts
        env:
          CR_TOKEN: "${{ steps.set-token.outputs.checkout_token }}"
          CR_GENERATE_RELEASE_NOTES: true

      - name: Append bundled images to release notes
        if: steps.release.outputs.changed_charts != ''
        env:
          GH_TOKEN: ${{ steps.set-token.outputs.checkout_token }}
        run: |
          version=$(grep -E '^version:' charts/miggo/Chart.yaml | head -1 | sed -E 's/version:[[:space:]]*//; s/"//g')
          tag="miggo-${version}"
          section=$(.github/scripts/bundled-images-notes.sh charts/miggo)
          if ! body=$(gh release view "$tag" --json body -q .body 2>/dev/null); then
            echo "::warning::release $tag not found, skipping bundled-images notes"
            exit 0
          fi
          body="${body%%<!-- BUNDLED_IMAGES_START -->*}"
          while [ "${body: -1}" = $'\n' ]; do body="${body%$'\n'}"; done
          printf '%s\n\n%s\n' "$body" "$section" | gh release edit "$tag" --notes-file -
          echo "$section" >> "$GITHUB_STEP_SUMMARY"
