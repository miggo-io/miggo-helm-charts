name: Helm Lint

on:
  workflow_call:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch target branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          create-kind-cluster: "false"

      - name: Run chart-testing (lint)
        # If subchart dependencies are added to charts/miggo in the future,
        # re-add the relevant --chart-repos flags here so ct lint can resolve them.
        # e.g. --chart-repos prometheus=https://prometheus-community.github.io/helm-charts
        run: ct lint --target-branch ${{ github.base_ref }} --check-version-increment=false

      - name: Run make check-examples
        run: make check-examples
